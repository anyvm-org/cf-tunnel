  test-tcp-auto:
    runs-on: ubuntu-latest
    name: Test TCP auto fallback
    steps:
    - uses: actions/checkout@v6
    - name: Start local TCP server
      run: |
        python3 -c "
        import socket, threading
        def handle(c):
            c.sendall(b'TCP_TUNNEL_TEST_OK_AUTO\n')
            c.close()
        s = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
        s.setsockopt(socket.SOL_SOCKET, socket.SO_REUSEADDR, 1)
        s.bind(('0.0.0.0', 8899))
        s.listen(5)
        while True:
            c, _ = s.accept()
            threading.Thread(target=handle, args=(c,)).start()
        " &
        sleep 1
    - name: Verify local TCP server
      run: |
        python3 -c "
        import socket
        s = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
        s.connect(('localhost', 8899))
        data = s.recv(1024).decode()
        s.close()
        assert 'TCP_TUNNEL_TEST_OK_AUTO' in data, f'Unexpected: {data}'
        print(data.strip())
        "
    - name: Run TCP tunnel (auto)
      id: test
      uses: vmactions/cf-tunnel@main
      with:
        protocol: tcp
        port: 8899
    - name: Show tunnel server
      run: echo "server=${{ steps.test.outputs.server }}"
    - name: Verify TCP tunnel connectivity
      run: |
        SERVER="${{ steps.test.outputs.server }}"
        echo "Testing TCP tunnel: ${SERVER}"
        python3 -c "
        import socket, sys
        server = '${SERVER}'
        host, port = server.rsplit(':', 1)
        s = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
        s.settimeout(30)
        s.connect((host, int(port)))
        data = s.recv(1024).decode()
        s.close()
        print('Response:', data.strip())
        if 'TCP_TUNNEL_TEST_OK_AUTO' in data:
            print('TCP tunnel verification PASSED')
        else:
            print('TCP tunnel verification FAILED')
            sys.exit(1)
        "

