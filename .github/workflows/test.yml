name: Test

on: [push]

jobs:
  test-http-auto:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    name: HTTP auto (${{ matrix.os }})
    defaults:
      run:
        shell: bash
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-python@v5
      with:
        python-version: '3.x'
    - name: Start local HTTP server
      run: |
        python3 -c "
        from http.server import HTTPServer, BaseHTTPRequestHandler
        class H(BaseHTTPRequestHandler):
            def do_GET(self):
                self.send_response(200)
                self.send_header('Content-Type','text/plain')
                self.end_headers()
                self.wfile.write(b'TUNNEL_TEST_OK_AUTO')
            def log_message(self, *a): pass
        HTTPServer(('0.0.0.0',8899),H).serve_forever()
        " &
        sleep 2
    - name: Verify local server is running
      run: |
        python3 << 'PYEOF'
        import urllib.request
        resp = urllib.request.urlopen('http://localhost:8899').read().decode()
        assert 'TUNNEL_TEST_OK_AUTO' in resp, f'Unexpected: {resp}'
        print(resp)
        PYEOF
    - name: Run tunnel (auto)
      id: test
      uses: anyvm-org/cf-tunnel@main
      with:
        protocol: http
        port: 8899
    - name: Show tunnel server
      run: echo "server=${{ steps.test.outputs.server }}"
    - name: Verify tunnel connectivity
      run: |
        sleep 10
        SERVER="${{ steps.test.outputs.server }}"
        python3 << PYEOF
        import urllib.request, ssl, time, sys, socket
        from urllib.parse import urlparse
        ctx = ssl.create_default_context()
        server_raw = "${SERVER}".strip()
        parsed = urlparse(server_raw if '://' in server_raw else f'https://{server_raw}')
        host = (parsed.hostname or server_raw).strip()
        url = f'https://{host}'
        print(f'Testing tunnel: {url}')
        for attempt in range(12):
            try:
                socket.getaddrinfo(host, 443)
                resp = urllib.request.urlopen(url, timeout=30, context=ctx).read().decode()
                print(f'Attempt {attempt+1} response: {resp[:200]}')
                if 'TUNNEL_TEST_OK_AUTO' in resp:
                    print('Tunnel verification PASSED')
                    sys.exit(0)
            except Exception as e:
                print(f'Attempt {attempt+1} failed: {e}')
            time.sleep(5)
        print('Tunnel verification FAILED')
        sys.exit(1)
        PYEOF

