  test-tcp-auto:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    name: TCP auto (${{ matrix.os }})
    defaults:
      run:
        shell: bash
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-python@v5
      with:
        python-version: '3.x'
    - name: Start local TCP server
      run: |
        python3 -c "
        import socket, threading
        def handle(c):
            try:
                c.settimeout(10)
                req = c.recv(1024)
                c.sendall(b'TCP_TUNNEL_TEST_OK_AUTO\n')
            except: pass
            finally: c.close()
        s = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
        s.setsockopt(socket.SOL_SOCKET, socket.SO_REUSEADDR, 1)
        s.bind(('0.0.0.0', 8899))
        s.listen(5)
        while True:
            c, _ = s.accept()
            threading.Thread(target=handle, args=(c,)).start()
        " &
        sleep 2
    - name: Verify local TCP server
      run: |
        python3 -c "
        import socket
        s = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
        s.connect(('localhost', 8899))
        s.sendall(b'PING')
        data = s.recv(1024).decode()
        s.close()
        assert 'TCP_TUNNEL_TEST_OK_AUTO' in data, f'Unexpected: {data}'
        print(data.strip())
        "
    - name: Run TCP tunnel (auto)
      id: test
      uses: anyvm-org/cf-tunnel@main
      with:
        protocol: tcp
        port: 8899
    - name: Show tunnel server
      run: echo "server=${{ steps.test.outputs.server }}"
    - name: Verify TCP tunnel connectivity
      run: |
        SERVER="${{ steps.test.outputs.server }}"
        echo "Testing TCP tunnel: ${SERVER}"
        python3 -c "
        import socket, sys, time
        server = '${SERVER}'
        if ':' in server:
            host, port = server.rsplit(':', 1)
            port = int(port)
        else:
            print(f'Server {server} has no port (e.g. cloudflared TCP) - cannot verify with raw socket, skipping')
            sys.exit(0)
        for attempt in range(5):
            try:
                s = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
                s.settimeout(30)
                s.connect((host, port))
                s.sendall(b'PING')
                data = s.recv(1024).decode()
                s.close()
                print(f'Attempt {attempt+1} response:', data.strip())
                if 'TCP_TUNNEL_TEST_OK_AUTO' in data:
                    print('TCP tunnel verification PASSED')
                    sys.exit(0)
            except Exception as e:
                print(f'Attempt {attempt+1} failed: {e}')
            time.sleep(5)
        print('TCP tunnel verification FAILED after 5 attempts')
        sys.exit(1)
        "

