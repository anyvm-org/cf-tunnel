name: Test

on: [push]

jobs:
  testtunnel:
    runs-on: ubuntu-latest
    name: Test auto fallback (all providers)
    steps:
    - uses: actions/checkout@v6
    - name: Start local HTTP server
      run: |
        python3 -c "
        from http.server import HTTPServer, BaseHTTPRequestHandler
        class H(BaseHTTPRequestHandler):
            def do_GET(self):
                self.send_response(200)
                self.send_header('Content-Type','text/plain')
                self.end_headers()
                self.wfile.write(b'TUNNEL_TEST_OK_AUTO')
            def log_message(self, *a): pass
        HTTPServer(('0.0.0.0',8899),H).serve_forever()
        " &
        sleep 1
    - name: Verify local server is running
      run: curl -s http://localhost:8899 | grep TUNNEL_TEST_OK_AUTO
    - name: Run establish a tunnel (auto)
      id: test
      uses: vmactions/cf-tunnel@main
      with:
        protocol: http
        port: 8899
    - name: Show tunnel server
      run: echo "server=${{ steps.test.outputs.server }}"
    - name: Verify tunnel connectivity
      run: |
        SERVER="${{ steps.test.outputs.server }}"
        echo "Testing tunnel: https://${SERVER}"
        RESP=$(curl -sL --retry 3 --retry-delay 5 --max-time 30 "https://${SERVER}")
        echo "Response: ${RESP}"
        if echo "${RESP}" | grep -q "TUNNEL_TEST_OK_AUTO"; then
          echo "Tunnel verification PASSED"
        else
          echo "Tunnel verification FAILED"
          exit 1
        fi

