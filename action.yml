name: 'cf-tunnel'
description: 'Run establish a cloudflare tunnel'
inputs:
  protocol:
    description: 'tcp or http'
    required: false
  port:
    description: 'port to forward to'
    required: true
  provider:
    description: 'Tunnel provider: cf, localhost.run, pinggy, serveo, localtunnel. Empty to try all in order.'
    required: false
    default: ''
outputs:
  server:
    description: 'The server'


branding:
  icon: 'activity'  
  color: 'green'

runs:
  using: 'node24'
  main: 'index.js'
